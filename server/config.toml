[server]
port = 8010
mode = "debug"
read_timeout = 120
write_timeout = 120

[database]
host = "localhost"
port = 5432
user = "postgres"
password = "123456"
dbname = "so"
sslmode = "disable"
max_idle = 10
max_open = 50

[redis]
enabled = true       # 是否启用 Redis (关闭则降级为本地内存缓存)
prefix = "netyadmin" # 统一的 Key 前缀 (多项目共用 Redis 时用于隔离)
host = "localhost"
port = 6379
password = ""
db = 0

# L1 缓存 (BigCache) 配置
l1_enabled = false       # 当 Redis 开启时，是否开启本地一级缓存 (开启可大幅提升读性能)
local_max_size_mb = 256  # 本地缓存最大内存占用 (MB)
local_max_entry_kb = 500 # 单条缓存记录最大大小 (KB)
local_ttl_min = 10       # 本地缓存默认过期时间 (分钟)

[jwt]
secret = "your-secret-key-change-in-production"
expiration = 168

[migration]
enabled = true
dir = "migrations"

[task]
enabled = true # 是否开启任务管理器
workers = 5    # 后台 Worker 数量（根据业务负载和服务器配置调节）

# 文章定时发布任务
# 代码中已定义默认：间隔执行(interval), 周期 1m, 权重 80, 默认开启。
[task.jobs.article_publish]
spec = "1m" # 您可以随时在这里修改执行频率，不写则按 1m 执行

[task.jobs.log_cleanup]
enabled = true
spec = "0 0 2 * * *" # 每天凌晨2点

[security]
aes_key = "netyadmin-aes-key-32-chars-long!" # 32字节对应 AES-256

[email]
enabled = false
host = "smtp.example.com"
port = 465
user = "your-email@example.com"
password = "your-password"
from = "your-email@example.com"
ssl = true
starttls = false
auth_type = "plain"
connect_timeout = 30
send_timeout = 30

[sms]
enabled = false
driver = "tencent"
secret_id = ""
secret_key = ""
app_id = ""
sign_name = ""

[bus]
# driver = "redis"    # 集群模式：基于 Redis Pub/Sub，支持多节点广播
# driver = "memory"   # 单机模式：基于内存 channel，无需 Redis
# 不设置则根据 Redis.Enabled 自动选择（Redis 启用 -> redis，否则 -> memory）
