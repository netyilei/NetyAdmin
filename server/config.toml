[server]
port = 8010
mode = "debug"
read_timeout = 60
write_timeout = 60

[database]
host = "localhost"
port = 5432
user = "postgres"
password = "123456"
dbname = "na"
sslmode = "disable"
max_idle = 10
max_open = 50

[redis]
enabled = true         # 是否启用 Redis (关闭则降级为本地内存缓存)
prefix = "na"          # 统一的 Key 前缀 (多项目共用 Redis 时用于隔离)
host = "localhost"
port = 6379
password = ""
db = 0

[jwt]
secret = "your-secret-key-change-in-production"
expiration = 168

[migration]
enabled = true # 是否开启启动时的数据库自动迁移
dir = "migrations"

[task]
enabled = true # 是否开启任务管理器

# 文章定时发布任务
# 代码中已定义默认：间隔执行(interval), 周期 1m, 权重 80, 默认开启。
[task.jobs.article_publish]
spec = "1m" # 您可以随时在这里修改执行频率，不写则按 1m 执行
